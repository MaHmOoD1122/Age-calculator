<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="main">
      <div class="inputs-container">
        <div class="input-group">
          <label for="day">Day</label>
          <input
            type="number"
            id="day"
            placeholder="DD"
            min="1"
            max="31"
            class="input day-input"
            required
          />
          <span class="input-error day-empty hidden"
            >This field is required</span
          >
          <span class="input-error day-error hidden">Must be a valid day</span>
          <p></p>
        </div>
        <div class="input-group">
          <label for="month">Month</label>
          <input
            type="number"
            id="month"
            placeholder="MM"
            min="1"
            max="12"
            class="input month-input"
            required
          />
          <span class="input-error month-empty hidden"
            >This field is required</span
          >
          <span class="input-error month-error hidden"
            >Must be a valid month</span
          >
        </div>
        <div class="input-group">
          <label for="year">Year</label>
          <input
            type="number"
            id="year"
            placeholder="YYYY"
            min="1940"
            max="2100"
            class="input year-input"
            required
          />
          <span class="input-error year-empty hidden"
            >This field is required</span
          >
          <span class="input-error year-error hidden">Must be in the past</span>
        </div>
      </div>
      <div class="separator-container">
        <span class="separator"></span>
        <button class="calculate-btn">
          <img
            src="images/icon-arrow.svg"
            alt="arrow icon"
            class="arrow-icon"
          />
        </button>
      </div>
      <div class="age-container">
        <p class="year"><span class="year-no">- - </span>years</p>
        <p class="month"><span class="month-no">- - </span>months</p>
        <p class="day"><span class="day-no">- - </span>days</p>
      </div>
    </main>
    <script defer src="script.js"></script>
  </body>
</html>
